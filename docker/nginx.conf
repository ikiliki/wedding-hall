# Wedding Hall — local Supabase API gateway.
# Exposes one origin (http://localhost:54321) that supabase-js can use,
# routing /auth/v1/* to gotrue and /rest/v1/* to postgrest.

events {}

http {
  server {
    listen 8000;
    server_name _;

    # Permissive CORS for local development only.
    # `*` is fine here because supabase-js does not use cookie credentials
    # (it puts the bearer token in Authorization manually). Echo back any
    # exposed headers so client paginators (Content-Range etc.) keep working.
    add_header 'Access-Control-Allow-Origin'  '*' always;
    add_header 'Access-Control-Allow-Methods' '*' always;
    add_header 'Access-Control-Allow-Headers' '*' always;
    add_header 'Access-Control-Expose-Headers' '*' always;
    add_header 'Access-Control-Max-Age'       '1728000' always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    # gotrue and postgrest both emit their own CORS headers; hide them so the
    # browser doesn't see "Access-Control-Allow-Origin: *, *" from this gateway.
    location /auth/v1/ {
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header Access-Control-Expose-Headers;
      proxy_hide_header Access-Control-Max-Age;
      proxy_pass http://auth:9999/;
      proxy_set_header Host              $host;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
    }

    location /rest/v1/ {
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header Access-Control-Expose-Headers;
      proxy_hide_header Access-Control-Max-Age;
      proxy_pass http://rest:3000/;
      proxy_set_header Host              $host;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
    }

    location = / {
      default_type text/plain;
      return 200 "Wedding Hall — local Supabase gateway\n";
    }
  }
}
