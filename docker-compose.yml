# Wedding Hall — local development stack.
#
# Brings up the entire app on your machine:
#   db       Postgres + Supabase roles
#   auth     gotrue (Supabase Auth)
#   rest     postgrest (Supabase data API)
#   gateway  nginx routing /auth/v1 + /rest/v1 onto port 54321
#   meta     postgres-meta (table/schema inspector used by Studio)
#   studio   Supabase Studio UI → http://localhost:54323
#   seed     one-shot: schema.sql + seed.sql + demo helpers + PostgREST NOTIFY
#   client     Vite dev server on http://localhost:5173
#   storybook  Storybook on http://localhost:6006 (MSW mocks; no DB/server required)
#   server     Next.js dev server on http://localhost:3001
#
# Bring it up:
#   docker compose up -d --build
#
# All secrets here are LOCAL DEV ONLY. The JWT secret + anon/service keys
# are the well-known Supabase demo values, signed with the secret below.
# DO NOT REUSE IN PRODUCTION.

name: wedding-hall

# JWT secret + matching anon/service keys are baked in below.
# These are LOCAL DEV ONLY. Do not reuse outside this docker stack.

services:
  db:
    image: postgres:15-alpine
    container_name: wh-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "54322:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 30

  auth:
    image: supabase/gotrue:v2.158.1
    container_name: wh-auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: http://localhost:54321
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:postgres@db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: http://localhost:5173
      GOTRUE_URI_ALLOW_LIST: http://localhost:5173,http://localhost:5173/auth/callback,http://localhost:3001
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@example.com
      GOTRUE_SMTP_HOST: ""
      GOTRUE_SMTP_PORT: "0"
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_SENDER_NAME: Wedding Hall (local)
      GOTRUE_LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 30

  rest:
    image: postgrest/postgrest:v12.2.3
    container_name: wh-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:postgres@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_DB_USE_LEGACY_GUCS: "false"

  gateway:
    image: nginx:1.27-alpine
    container_name: wh-gateway
    restart: unless-stopped
    depends_on:
      - auth
      - rest
    ports:
      - "54321:8000"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro

  meta:
    image: supabase/postgres-meta:v0.84.2
    container_name: wh-meta
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: db
      PG_META_DB_PORT: "5432"
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: postgres

  studio:
    image: supabase/studio:20241202-71e5240
    container_name: wh-studio
    restart: unless-stopped
    depends_on:
      - meta
      - gateway
    ports:
      - "54323:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      SUPABASE_URL: http://gateway:8000
      SUPABASE_PUBLIC_URL: http://localhost:54321
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6IndlZGRpbmctaGFsbC1sb2NhbCIsImlhdCI6MTY0MTc2OTIwMCwiZXhwIjoxNzk5NTM1NjAwfQ.JxejbUaxXmfGDcu7-FsaoReqSHXWG1CRnKUwq06VX3o
      SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoid2VkZGluZy1oYWxsLWxvY2FsIiwiaWF0IjoxNjQxNzY5MjAwLCJleHAiOjE3OTk1MzU2MDB9.-XtWcvIKEMGd54AScK2_CrZ9-a3y29tummnmCYwUn7g
      POSTGRES_PASSWORD: postgres
      DEFAULT_ORGANIZATION_NAME: Wedding Hall
      DEFAULT_PROJECT_NAME: Local Dev
      AUTH_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      NEXT_PUBLIC_ENABLE_LOGS: "false"

  seed:
    image: postgres:15-alpine
    container_name: wh-seed
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./supabase/schema.sql:/schema.sql:ro
      - ./supabase/seed.sql:/seed.sql:ro
    # DDL (`schema.sql`: vendor_categories, vendors, admin_users, …) then
    # `seed.sql` (demo + staff admin). `seed.sql` ends with NOTIFY so PostgREST
    # reloads its schema cache (avoids empty 404 on first /api/budget).
    entrypoint:
      - sh
      - -c
      - "psql -h db -U postgres -d postgres -v ON_ERROR_STOP=1 -f /schema.sql && psql -h db -U postgres -d postgres -v ON_ERROR_STOP=1 -f /seed.sql && echo '✓ Wedding Hall seeded'"
    restart: "no"

  client:
    build:
      # Repo root so the Dockerfile can pull in `packages/shared` and
      # let npm workspaces resolve `@wedding-hall/shared`.
      context: .
      dockerfile: client/Dockerfile
    container_name: wh-client
    restart: unless-stopped
    depends_on:
      - gateway
      - server
    ports:
      - "5173:5173"
    environment:
      VITE_SUPABASE_URL: http://localhost:54321
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6IndlZGRpbmctaGFsbC1sb2NhbCIsImlhdCI6MTY0MTc2OTIwMCwiZXhwIjoxNzk5NTM1NjAwfQ.JxejbUaxXmfGDcu7-FsaoReqSHXWG1CRnKUwq06VX3o
      # VITE_SERVER_URL is resolved from client/.env.development (vite dev mode).
      # Override here only if you want docker to point at a non-localhost server.
    volumes:
      - ./client:/repo/client
      - ./packages:/repo/packages
      # Keep node_modules and the shared symlink isolated from the host
      # so Linux container symlinks don't fight with Windows file mounts.
      - client_node_modules:/repo/node_modules
      - client_workspace_node_modules:/repo/client/node_modules

  storybook:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: wh-storybook
    restart: unless-stopped
    # UI-only dev: MSW + mock Supabase in Storybook; no gateway/server needed.
    ports:
      - "6006:6006"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      # Match `client` so Vite exposes `import.meta.env.VITE_*` inside the container.
      # (Storybook still aliases `@/shared/lib/supabase` to the shim; this avoids the
      # real `createClient` guard if anything resolves the app module path.)
      VITE_SUPABASE_URL: http://localhost:54321
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6IndlZGRpbmctaGFsbC1sb2NhbCIsImlhdCI6MTY0MTc2OTIwMCwiZXhwIjoxNzk5NTM1NjAwfQ.JxejbUaxXmfGDcu7-FsaoReqSHXWG1CRnKUwq06VX3o
      VITE_SERVER_URL: http://localhost:3001
    volumes:
      - ./client:/repo/client
      - ./packages:/repo/packages
      # Own node_modules volumes: `client_*` may predate Storybook in the image layer
      # and would hide hoisted `node_modules/.bin/storybook`.
      - storybook_repo_node_modules:/repo/node_modules
      - storybook_client_workspace_node_modules:/repo/client/node_modules
    # Run from monorepo root so hoisted `.bin/storybook` is on PATH (devDependency).
    working_dir: /repo
    command:
      [
        "npm",
        "run",
        "storybook",
        "-w",
        "wedding-hall-client",
        "--",
        "--host",
        "0.0.0.0",
        "--port",
        "6006",
        "--no-open",
      ]

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: wh-server
    restart: unless-stopped
    depends_on:
      - gateway
    ports:
      - "3001:3001"
    environment:
      # Server reaches the Supabase gateway on the docker network using
      # the well-known dev anon key (matches `auth` / `rest` JWT secret).
      SUPABASE_URL: http://gateway:8000
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6IndlZGRpbmctaGFsbC1sb2NhbCIsImlhdCI6MTY0MTc2OTIwMCwiZXhwIjoxNzk5NTM1NjAwfQ.JxejbUaxXmfGDcu7-FsaoReqSHXWG1CRnKUwq06VX3o
      # Same JWT as Studio `SUPABASE_SERVICE_KEY` — admin vendor POST `/api/admin/vendors` only (local dev).
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoid2VkZGluZy1oYWxsLWxvY2FsIiwiaWF0IjoxNjQxNzY5MjAwLCJleHAiOjE3OTk1MzU2MDB9.-XtWcvIKEMGd54AScK2_CrZ9-a3y29tummnmCYwUn7g
      CLIENT_ORIGIN: http://localhost:5173
    volumes:
      - ./server:/repo/server
      - ./packages:/repo/packages
      - server_node_modules:/repo/node_modules
      - server_workspace_node_modules:/repo/server/node_modules

volumes:
  db_data:
  client_node_modules:
  server_node_modules:
  client_workspace_node_modules:
  server_workspace_node_modules:
  storybook_repo_node_modules:
  storybook_client_workspace_node_modules:

