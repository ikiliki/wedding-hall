name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint -w wedding-hall-client
      - run: npm run build -w wedding-hall-client
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: anon-key-for-ci-only
          VITE_SERVER_URL: http://localhost:3001
      - run: npm run build-storybook -w wedding-hall-client
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: anon-key-for-ci-only
          VITE_SERVER_URL: http://localhost:3001

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint -w wedding-hall-server
      - run: npm run build -w wedding-hall-server
