# Production deploy: Vite React app in /client
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_CLIENT
# Optional (for build verification in CI): VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY

name: Deploy client

on:
  push:
    branches: [master-client]
  workflow_dispatch:

concurrency:
  group: deploy-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (workspaces)
        run: npm ci

      - name: Lint (client)
        run: npm run lint -w wedding-hall-client

      - name: Build (client)
        run: npm run build -w wedding-hall-client
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_CLIENT }}
          working-directory: client
          vercel-args: "--prod"
